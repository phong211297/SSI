services:
  # ─── Next.js App ──────────────────────────────────────────────────────────────
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: ssi_nextjs
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      # Override localhost → Docker service names
      DATABASE_URL: postgresql://${POSTGRES_USER:-ssi}:${POSTGRES_PASSWORD:-ssi_secret}@postgres:5432/${POSTGRES_DB:-ssi_db}
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      WORKER_URL: http://worker:8000
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules   # keep container's node_modules, don't override with host
      - /app/.next          # keep container's .next build cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy


  # ─── PostgreSQL with pgvector extension ───────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ssi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ssi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ssi_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ssi_db}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5 --auth-local=md5"
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-ssi} -d $${POSTGRES_DB:-ssi_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ssi_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Data Worker (Python) ─────────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: ssi_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ssi}:${POSTGRES_PASSWORD:-ssi_secret}@postgres:5432/${POSTGRES_DB:-ssi_db}
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      API_PORT: 8000
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./worker:/app
    command: watchmedo auto-restart --patterns="*.py" --recursive -- python main.py

volumes:
  postgres_data:
  redis_data:
